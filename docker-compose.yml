services:
  postgres:
    image: postgres:16-alpine
    container_name: resource-server-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: resource_server
      POSTGRES_USER: resource_server
      POSTGRES_PASSWORD: resource_server
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U resource_server -d resource_server']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
